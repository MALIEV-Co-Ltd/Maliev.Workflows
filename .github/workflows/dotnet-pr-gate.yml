name: Reusable .NET PR gate

on:
  workflow_call:
    inputs:
      target-path:
        description: Repository-relative solution or project path
        required: false
        type: string
        default: .
      working-directory:
        description: Repository-relative working directory
        required: false
        type: string
        default: .
      dotnet-version:
        description: Exact .NET SDK feature band or global.json-compatible version
        required: false
        type: string
        default: 10.0.x
      configuration:
        description: Build configuration (Release only in this baseline)
        required: false
        type: string
        default: Release
      coverage-threshold:
        description: Required aggregate line coverage percentage (0-100)
        required: false
        type: number
        default: 80
      artifact-retention-days:
        description: Test evidence retention (1-30 days)
        required: false
        type: number
        default: 7

permissions:
  contents: read

concurrency:
  group: dotnet-pr-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build, test, and inspect
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      TARGET_PATH: ${{ inputs.target-path }}
      WORKING_DIRECTORY: ${{ inputs.working-directory }}
      DOTNET_VERSION: ${{ inputs.dotnet-version }}
      CONFIGURATION: ${{ inputs.configuration }}
      COVERAGE_THRESHOLD: ${{ inputs.coverage-threshold }}
      ARTIFACT_RETENTION_DAYS: ${{ inputs.artifact-retention-days }}
      RESULTS_DIRECTORY: ${{ github.workspace }}/ci-results
    steps:
      - name: Validate bounded inputs
        shell: bash
        run: |
          python3 - <<'PY'
          # INPUT_VALIDATION_PYTHON
          from decimal import Decimal, InvalidOperation
          import os
          import re

          def fail(message: str) -> None:
              print(f"::error::{message}")
              raise SystemExit(1)

          def validate_path(name: str) -> None:
              value = os.environ[name]
              segments = value.split("/")
              if (
                  not value
                  or value.startswith("/")
                  or "\\" in value
                  or ".." in segments
                  or not re.fullmatch(r"[A-Za-z0-9._/+@-]+", value)
              ):
                  fail(f"{name.lower().replace('_', '-')} must be a safe repository-relative path.")

          validate_path("TARGET_PATH")
          validate_path("WORKING_DIRECTORY")
          if not re.fullmatch(r"[0-9]+\.[0-9]+\.(?:x|[0-9]+)(?:-[A-Za-z0-9.-]+)?", os.environ["DOTNET_VERSION"]):
              fail("dotnet-version is not a bounded SDK version expression.")
          if os.environ["CONFIGURATION"] != "Release":
              fail("configuration must be Release.")

          threshold_text = os.environ["COVERAGE_THRESHOLD"]
          if not re.fullmatch(r"(?:0|[1-9][0-9]*)(?:\.[0-9]+)?", threshold_text):
              fail("coverage-threshold must be a plain decimal between 0 and 100.")
          try:
              threshold = Decimal(threshold_text)
          except InvalidOperation:
              fail("coverage-threshold must be a plain decimal between 0 and 100.")
          if not threshold.is_finite() or threshold < 0 or threshold > 100:
              fail("coverage-threshold must be between 0 and 100.")

          retention_text = os.environ["ARTIFACT_RETENTION_DAYS"]
          if not re.fullmatch(r"[0-9]+", retention_text):
              fail("artifact-retention-days must be an integer from 1 to 30.")
          retention = int(retention_text)
          if retention < 1 or retention > 30:
              fail("artifact-retention-days must be an integer from 1 to 30.")
          PY

      - name: Check out source without credentials
        id: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Resolve validated paths
        shell: bash
        run: |
          set -euo pipefail
          work_root="$(realpath -m -- "$GITHUB_WORKSPACE/$WORKING_DIRECTORY")"
          target="$(realpath -m -- "$work_root/$TARGET_PATH")"
          case "$work_root/" in "$GITHUB_WORKSPACE/"*) ;; *) echo "::error::working-directory escapes the checkout."; exit 1 ;; esac
          case "$target" in "$work_root"|"$work_root/"*) ;; *) echo "::error::target-path escapes working-directory."; exit 1 ;; esac
          [[ -e "$target" ]] || { echo "::error::target-path does not exist: $TARGET_PATH"; exit 1; }
          printf 'CI_WORK_ROOT=%s\nCI_TARGET=%s\n' "$work_root" "$target" >> "$GITHUB_ENV"

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ inputs.dotnet-version }}-${{ hashFiles('**/*.sln', '**/*.slnx', '**/*.csproj', '**/*.props', '**/*.targets', '**/packages.lock.json', 'global.json', 'NuGet.config') }}
          restore-keys: |
            nuget-${{ runner.os }}-${{ inputs.dotnet-version }}-

      - name: Restore
        id: restore
        shell: bash
        run: |
          set -euo pipefail
          cd "$CI_WORK_ROOT"
          dotnet restore "$CI_TARGET"

      - name: Audit vulnerable dependencies
        shell: bash
        run: |
          set -euo pipefail
          cd "$CI_WORK_ROOT"
          mkdir -p "$RESULTS_DIRECTORY/package-audit"
          dotnet list "$CI_TARGET" package --vulnerable --include-transitive --format json > "$RESULTS_DIRECTORY/package-audit/vulnerable.json"

      - name: Audit deprecated dependencies
        shell: bash
        run: |
          set -euo pipefail
          cd "$CI_WORK_ROOT"
          mkdir -p "$RESULTS_DIRECTORY/package-audit"
          dotnet list "$CI_TARGET" package --deprecated --include-transitive --format json > "$RESULTS_DIRECTORY/package-audit/deprecated.json"

      - name: Enforce dependency audit
        shell: bash
        run: |
          set -euo pipefail
          python3 - "$RESULTS_DIRECTORY/package-audit" <<'PY'
          import json
          import pathlib
          import sys

          root = pathlib.Path(sys.argv[1])
          findings = []
          for report in root.glob("*.json"):
              data = json.loads(report.read_text(encoding="utf-8"))
              for project in data.get("projects", []):
                  for framework in project.get("frameworks", []):
                      for package_kind in ("topLevelPackages", "transitivePackages"):
                          for package in framework.get(package_kind, []):
                              if package.get("vulnerabilities") or package.get("deprecationReasons"):
                                  findings.append(
                                      f"{report.stem}: {project.get('path', '<project>')} "
                                      f"{package.get('id', '<package>')} {package.get('resolvedVersion', '')}"
                                  )
          if findings:
              print("::error::Vulnerable or deprecated dependencies found")
              print("\n".join(findings))
              raise SystemExit(1)
          PY

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          cd "$CI_WORK_ROOT"
          dotnet build "$CI_TARGET" --configuration "$CONFIGURATION" --no-restore

      - name: Test with line coverage
        shell: bash
        run: |
          set -euo pipefail
          cd "$CI_WORK_ROOT"
          mkdir -p "$RESULTS_DIRECTORY/tests"
          dotnet test "$CI_TARGET" --configuration "$CONFIGURATION" --no-restore --no-build --collect:"XPlat Code Coverage" --results-directory "$RESULTS_DIRECTORY/tests" --logger "trx;LogFilePrefix=tests"

      - name: Enforce line coverage threshold
        shell: bash
        run: |
          set -euo pipefail
          python3 - "$RESULTS_DIRECTORY/tests" "$COVERAGE_THRESHOLD" <<'PY'
          # COVERAGE_ENFORCEMENT_PYTHON
          import pathlib
          import re
          import sys
          import xml.etree.ElementTree as ET

          reports = list(pathlib.Path(sys.argv[1]).rglob("coverage.cobertura.xml"))
          if not reports:
              print("::error::No Cobertura coverage reports were produced.")
              raise SystemExit(1)

          source_lines: dict[tuple[str, int], bool] = {}
          for report in reports:
              root = ET.parse(report).getroot()
              for source_class in root.findall(".//class"):
                  filename = source_class.attrib.get("filename", "").replace("\\", "/")
                  filename = re.sub(r"/+", "/", filename)
                  while filename.startswith("./"):
                      filename = filename[2:]
                  if not filename:
                      print(f"::error::{report} contains a class without a source filename.")
                      raise SystemExit(1)
                  for line in source_class.findall("./lines/line"):
                      try:
                          line_number = int(line.attrib["number"])
                          hits = int(line.attrib.get("hits", "0"))
                      except (KeyError, ValueError):
                          print(f"::error::{report} contains an invalid coverage line record.")
                          raise SystemExit(1)
                      if line_number <= 0 or hits < 0:
                          print(f"::error::{report} contains an invalid coverage line record.")
                          raise SystemExit(1)
                      identity = (filename, line_number)
                      source_lines[identity] = source_lines.get(identity, False) or hits > 0

          valid = len(source_lines)
          covered = sum(source_lines.values())
          if valid == 0:
              print("::error::Coverage reports contain no valid lines.")
              raise SystemExit(1)
          percentage = covered * 100.0 / valid
          threshold = float(sys.argv[2])
          print(f"Aggregate line coverage: {percentage:.2f}% (required: {threshold:.2f}%)")
          if percentage + 1e-9 < threshold:
              print(f"::error::Line coverage {percentage:.2f}% is below {threshold:.2f}%.")
              raise SystemExit(1)
          PY

      - name: Verify formatting
        if: ${{ !cancelled() && steps.restore.outcome == 'success' }}
        shell: bash
        run: |
          set -euo pipefail
          cd "$CI_WORK_ROOT"
          dotnet format "$CI_TARGET" --verify-no-changes --no-restore

      - name: Install checksum-verified Gitleaks
        id: gitleaks-install
        if: ${{ !cancelled() }}
        shell: bash
        run: |
          set -euo pipefail
          readonly version="8.30.1"
          readonly archive="gitleaks_${version}_linux_x64.tar.gz"
          readonly checksum="551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
          curl --fail --location --proto '=https' --tlsv1.2 --retry 3 --output "$RUNNER_TEMP/$archive" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${version}/${archive}"
          printf '%s  %s\n' "$checksum" "$RUNNER_TEMP/$archive" | sha256sum --check --strict
          tar -xzf "$RUNNER_TEMP/$archive" -C "$RUNNER_TEMP" gitleaks
          install -m 0755 "$RUNNER_TEMP/gitleaks" "$RUNNER_TEMP/gitleaks-bin"

      - name: Scan repository history for secrets
        if: ${{ !cancelled() && steps.checkout.outcome == 'success' && steps.gitleaks-install.outcome == 'success' }}
        shell: bash
        run: |
          "$RUNNER_TEMP/gitleaks-bin" detect --source "$GITHUB_WORKSPACE" --no-banner --redact --exit-code 1

      - name: Upload test, coverage, and audit evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dotnet-pr-gate-${{ github.run_id }}-${{ github.run_attempt }}
          path: ci-results/
          if-no-files-found: error
          retention-days: ${{ inputs.artifact-retention-days }}
          compression-level: 6
