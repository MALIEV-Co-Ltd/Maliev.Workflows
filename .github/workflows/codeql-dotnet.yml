name: Reusable CodeQL for .NET

on:
  workflow_call:
    inputs:
      target-path:
        description: Repository-relative solution or project path
        required: false
        type: string
        default: .
      working-directory:
        description: Repository-relative working directory
        required: false
        type: string
        default: .
      dotnet-version:
        description: Exact .NET SDK feature band or global.json-compatible version
        required: false
        type: string
        default: 10.0.x

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-dotnet-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze C#
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      TARGET_PATH: ${{ inputs.target-path }}
      WORKING_DIRECTORY: ${{ inputs.working-directory }}
      DOTNET_VERSION: ${{ inputs.dotnet-version }}
    steps:
      - name: Validate bounded inputs
        shell: bash
        run: |
          python3 - <<'PY'
          # CODEQL_INPUT_VALIDATION_PYTHON
          import os
          import re

          def fail(message: str) -> None:
              print(f"::error::{message}")
              raise SystemExit(1)

          def validate_path(name: str) -> None:
              value = os.environ[name]
              segments = value.split("/")
              if (
                  not value
                  or value.startswith("/")
                  or "\\" in value
                  or ".." in segments
                  or not re.fullmatch(r"[A-Za-z0-9._/+@-]+", value)
              ):
                  fail(f"{name.lower().replace('_', '-')} must be a safe repository-relative path.")

          validate_path("TARGET_PATH")
          validate_path("WORKING_DIRECTORY")
          if not re.fullmatch(r"[0-9]+\.[0-9]+\.(?:x|[0-9]+)(?:-[A-Za-z0-9.-]+)?", os.environ["DOTNET_VERSION"]):
              fail("dotnet-version is not a bounded SDK version expression.")
          PY

      - name: Check out source without credentials
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Resolve validated paths
        shell: bash
        run: |
          set -euo pipefail
          work_root="$(realpath -m -- "$GITHUB_WORKSPACE/$WORKING_DIRECTORY")"
          target="$(realpath -m -- "$work_root/$TARGET_PATH")"
          case "$work_root/" in "$GITHUB_WORKSPACE/"*) ;; *) echo "::error::working-directory escapes the checkout."; exit 1 ;; esac
          case "$target" in "$work_root"|"$work_root/"*) ;; *) echo "::error::target-path escapes working-directory."; exit 1 ;; esac
          [[ -e "$target" ]] || { echo "::error::target-path does not exist: $TARGET_PATH"; exit 1; }
          printf 'CI_WORK_ROOT=%s\nCI_TARGET=%s\n' "$work_root" "$target" >> "$GITHUB_ENV"

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: csharp
          build-mode: manual

      - name: Restore and build analyzed source
        shell: bash
        run: |
          set -euo pipefail
          cd "$CI_WORK_ROOT"
          dotnet restore "$CI_TARGET"
          dotnet build "$CI_TARGET" --configuration Release --no-restore

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: /language:csharp
          upload: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork && 'never' || 'always' }}
